spring.application.name=tads_aulas

# Datasource Configuration
# localhost
spring.datasource.url=jdbc:mysql://usuario:senha@servidor:porta/bancoDeDados
spring.datasource.hikari.maximum-pool-size=5

# JPA
# Hibernate ddl auto (create, create-drop, update, none): com "update" o esquema do database é automaticamente
# modificado, conforme as anotações JPA nas entidades Java da camada de modelo.
spring.jpa.hibernate.ddl-auto=update
# JPA-SQL (as propriedades abaixo instruem o Spring Boot a imprimir o SQL e formatá-lo)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# adia a inicialização da execução dos scripts para depois da cria??o dos EntityManager do JPA (o padrão o script executar antes do JPA)
spring.jpa.defer-datasource-initialization=false
# ordena a execução dos scripts do arquivo data.sql (Valor na primeira execução always. Lembre de colocar para never depois da primeira execução)
spring.sql.init.mode=never

# spring-data-rest
spring.data.rest.basePath=/api

# Secret para gera??o do token JWT
# As chaves indicam ao Spring Boot para ele procurar por uma vari?vel de ambiente a partir do valor que est? nela.
# Ap?s os : ? o valor que ele utiliza caso n?o localize a vari?vel de ambiente. No caso, procura por JWT_SECRET, sen?o, aplica 12345678
api.security.token.secret=${JWT_SECRET:12345678}
